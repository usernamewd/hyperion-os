name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build + clippy + fmt + artifacts
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustup target add aarch64-unknown-none
          rustup target add aarch64-unknown-uefi
          rustup target add x86_64-unknown-none
          rustup target add x86_64-unknown-uefi
          rustup component add clippy rustfmt

      - name: Install ISO tools
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin grub-efi-amd64-bin grub-common xorriso mtools dosfstools gdisk

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: rustfmt
        run: make fmt-check

      - name: clippy (all)
        run: make clippy-all

      - name: build kernels
        run: make build-all

      - name: build production ISOs
        run: |
          make ARCH=aarch64 iso-uefi
          make ARCH=x86_64 iso-bios
          make ARCH=x86_64 iso-uefi

      - name: Upload kernel binaries
        uses: actions/upload-artifact@v4
        with:
          name: hyperion-kernels
          path: |
            target/aarch64-unknown-none/release/hyperion-kernel
            target/x86_64-unknown-none/release/hyperion-kernel

      - name: Upload production ISOs
        uses: actions/upload-artifact@v4
        with:
          name: hyperion-production-isos
          path: |
            target/hyperion-aarch64-uefi.iso
            target/hyperion-x86_64-bios.iso
            target/hyperion-x86_64-uefi.iso

  smoke:
    name: QEMU smoke test
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustup target add aarch64-unknown-none

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build kernel
        run: cargo build -p hyperion-kernel --target aarch64-unknown-none --release

      - name: Boot under QEMU and run a few shell commands
        run: |
          set -e
          BIN=target/aarch64-unknown-none/release/hyperion-kernel
          OUT=$(mktemp)
          # Pipe a small script of commands and shut down. 12s ceiling.
          {
            printf 'help\nls /\nmem\nps\ndisplay\ncat /welcome\nuptime\n'
            sleep 4
            printf 'shutdown\n'
            sleep 2
          } | timeout 12 qemu-system-aarch64 \
              -M virt -cpu cortex-a72 -smp 1 -m 512M \
              -display none -serial stdio \
              -kernel "$BIN" | tee "$OUT"
          # Sanity-check that the boot banner and key shell output appeared.
          grep -q "Hyperion OS" "$OUT"
          grep -q "Hyperion shell ready" "$OUT"
          grep -q "RAM (managed)" "$OUT"
          grep -q "monitor #0" "$OUT"
          grep -q "Welcome to Hyperion OS" "$OUT"
