name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build + clippy + fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustup target add aarch64-unknown-none
          rustup component add clippy rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (libos-api)
        run: cargo clippy -p hyperion-os-api --all-features -- -D warnings

      - name: clippy (kernel, aarch64)
        run: cargo clippy -p hyperion-kernel --target aarch64-unknown-none --release -- -D warnings

      - name: build (kernel, aarch64)
        run: cargo build -p hyperion-kernel --target aarch64-unknown-none --release

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperion-kernel
          path: target/aarch64-unknown-none/release/hyperion-kernel

  smoke:
    name: QEMU smoke test
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        run: |
          rustup show
          rustup target add aarch64-unknown-none

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build kernel
        run: cargo build -p hyperion-kernel --target aarch64-unknown-none --release

      - name: Boot under QEMU and run a few shell commands
        run: |
          set -e
          BIN=target/aarch64-unknown-none/release/hyperion-kernel
          OUT=$(mktemp)
          # Pipe a small script of commands and shut down. 12s ceiling.
          {
            printf 'help\nls /\nmem\nps\ndisplay\ncat /welcome\nuptime\n'
            sleep 4
            printf 'shutdown\n'
            sleep 2
          } | timeout 12 qemu-system-aarch64 \
              -M virt -cpu cortex-a72 -smp 1 -m 512M \
              -display none -serial stdio \
              -kernel "$BIN" | tee "$OUT"
          # Sanity-check that the boot banner and key shell output appeared.
          grep -q "Hyperion OS" "$OUT"
          grep -q "Hyperion shell ready" "$OUT"
          grep -q "RAM (managed)" "$OUT"
          grep -q "monitor #0" "$OUT"
          grep -q "Welcome to Hyperion OS" "$OUT"
